name: "Docker Build Stock R2 Fix"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the Docker image"
        required: false
        default: "latest"
        type: string

jobs:
  build:
    name: Build and Push Stock-Based R2 Fix Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GITHUB_REPOSITORY_OWNER
        run: |
          echo "REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER@L}" >>${GITHUB_ENV}

      - name: Build and Push Stock-Based Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/cap-web-stock-r2fix.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ env.REPOSITORY_OWNER }}/cap-web-stock-r2fix:${{ inputs.tag || 'latest' }}
          cache-from: type=gha,scope=stock-r2fix-amd64
          cache-to: type=gha,mode=max,scope=stock-r2fix-amd64
